<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Siggy Ritual AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body>

<div class="background"></div>
<div class="background-glow"></div>

<div id="tsparticles"></div>

<header class="header">

<div class="logo">

<div class="siggy-icon">🧙‍♀️</div>

<div>
<h2>Siggy</h2>
<span>Arcane Guardian of Ritual</span>
</div>

</div>

<div class="status">
● Channeling the Grid
</div>

</header>

<main class="center">

<div class="title-zone">

<div class="star">🧙‍♀️</div>

<h1>🫧🅳🅴🅼🅾🅽 🅺🅽🅸🅶🅷🆃🫧</h1>

<p>
Siggy loves everyone, so ask and Siggy will answer.
</p>

</div>

<div id="chat"></div>

</main>


<!-- INPUT BAR -->

<div class="input-bar">

<button id="attach" class="tool-btn">📎</button>

<input id="input" placeholder="Ask anything"/>

<select id="mode">
<option>Auto</option>
<option>Fast</option>
<option>Smart</option>
</select>

<!-- MICROPHONE ICON -->

<button id="voice" class="voice-icon">
<svg viewBox="0 0 24 24">
<path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a1 1 0 012 0 7 7 0 01-14 0 1 1 0 012 0 5 5 0 0010 0zM11 19h2v3h-2z"/>
</svg>
</button>

<button id="send">➤</button>

</div>

<input type="file" id="fileInput" style="display:none">

<script src="script.js"></script>

</body>
</html>
