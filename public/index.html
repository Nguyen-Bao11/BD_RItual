<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Siggy Ritual AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body>

<div class="background"></div>
<div class="background-glow"></div>

<div id="tsparticles"></div>

<header class="header">

<div class="logo">

<div class="siggy-icon">🧙‍♀️</div>

<div>
<h2>Siggy</h2>
<span>Arcane Guardian of Ritual</span>
</div>

</div>

<div class="status">
● Channeling the Grid
</div>

</header>

<main class="center">

<div class="title-zone">

<div class="star">🧙‍♀️</div>

<h1>🫧🅳🅴🅼🅾🅽 🅺🅽🅸🅶🅷🆃🫧</h1>

<p>
Siggy loves everyone, so ask and Siggy will answer.
</p>

</div>

<div id="chat"></div>

</main>

<div class="input-bar">

<button id="attach" class="tool-btn">📎</button>

<input id="input" placeholder="Ask anything"/>

<select id="mode">
<option>Auto</option>
<option>Fast</option>
<option>Smart</option>
</select>

<button id="voice" class="tool-btn">🎤</button>

<button id="send">➤</button>

</div>

<script src="script.js"></script>

</body>
</html>
<input type="file" id="fileInput" style="display:none">
