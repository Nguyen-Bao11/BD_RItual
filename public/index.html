<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Siggy Ritual AI</title>

<link rel="stylesheet" href="style.css">

<!-- PARTICLES LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body>

<div class="background"></div>
<div id="tsparticles"></div>

<header class="header">

<div class="logo">

<div class="siggy-icon">🧙‍♀️</div>

<div>
<h2>Siggy</h2>
<span>Arcane Guardian of Ritual</span>
</div>

</div>

<div class="status">
● Channeling the Grid
</div>

</header>

<main class="center">

<div class="title-zone">

<div class="star">🧙‍♀️</div>

<h1>🫧🅳🅴🅼🅾🅽 🅺🅽🅸🅶🅷🆃🫧</h1>

<p>
Siggy loves everyone, so ask and Siggy will answer.
</p>

</div>

<div id="chat"></div>

</main>

<div class="input-bar">

<input id="input" placeholder="Speak to Siggy..." />

<button id="send">➤</button>

</div>

<script src="script.js"></script>

<!-- PARTICLES EFFECT -->
<script>

tsParticles.load("tsparticles", {
  background: {
    color: {
      value: "transparent"
    }
  },
  fpsLimit: 60,
  particles: {
    number: {
      value: 90,
      density: {
        enable: true,
        area: 800
      }
    },
    color: {
      value: ["#ffffff","#9f7aea","#7dd3fc"]
    },
    shape: {
      type: "circle"
    },
    opacity: {
      value: 0.5,
      random: true
    },
    size: {
      value: { min: 1, max: 3 }
    },
    links: {
      enable: true,
      distance: 150,
      color: "#a78bfa",
      opacity: 0.3,
      width: 1
    },
    move: {
      enable: true,
      speed: 1.2,
      direction: "none",
      random: false,
      straight: false,
      outModes: {
        default: "bounce"
      }
    }
  },
  interactivity: {
    events: {
      onHover: {
        enable: true,
        mode: "grab"
      },
      onClick: {
        enable: true,
        mode: "push"
      }
    },
    modes: {
      grab: {
        distance: 140,
        links: {
          opacity: 0.8
        }
      },
      push: {
        quantity: 4
      }
    }
  },
  detectRetina: true
});

</script>

</body>
</html>
